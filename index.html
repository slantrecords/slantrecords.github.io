<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Mix/Mastering by Slant Records</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

body {
    font-family: Arial, sans-serif;
    padding: 20px;

    /* układ strony */
    margin: 0;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;

    /* fallback (desktop) */
    background-image: url("tlo.jpg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;

    /* usuwamy problematyczne fixed */
    background-attachment: scroll;
}

/* FIX: prawdziwe "fixed background" */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background-image: url("tlo.jpg");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;

    z-index: -1;
}

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 10px;

            display: flex;
            justify-content: center;
            flex-direction: column;
            gap: 20px;

            align-items: flex-start;

        }

        .box {
            display: inline-block; /* automatyczna długość box'a */
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px;
            border-radius: 10px;
            text-align: left;
            
        }

        /* Styl dla telefonów */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                background-attachment: fixed;
            }

            .box {
                font-size: 18px;
            }
        }

        /* Styl dla komputerów */
        @media (min-width: 769px) {
            .box {
                font-size: 20px;
            }
        }

        /* Lista utworów */
        .song-list {
        padding: 20px;
        }

        .song {
        display: block;
        margin-bottom: 10px;
        padding: 10px;
        background: rgba(0,0,0,0.6);
        color: white;
        border-radius: 10px;
        text-decoration: none;
        width: fit-content;
        cursor: pointer;
        }

        /* Pasek audio na dole */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;

            background: rgba(0,0,0,0.15);

            padding: 10px;

            box-sizing: border-box;

            backdrop-filter: blur(10px);

            z-index: 999;
        }

        /* Audio */
        audio {
            width: 100%;
            filter: invert(1) sepia(1) saturate(5) hue-rotate(200deg);
        }


    </style>

</head>
<body>
    <!--
    <div class="container">
        <div class="box">🔊 Jaker - Oppenheimer feat. SeReK, Eren (cuty. SeReK)</div>
        <div class="box">🔊 SeReK & Eren - Dobranocka feat. Mart</div>
        <div class="box">🔊 Blackpope Bman - Underdogs (feat. Kluzio & Gieha)</div>
        <div class="box">🔊 KW4RC - Nie ma miejsca jak dom ft.SeReK	</div>
        <div class="box">🔊 Urwis - Rodeo feat. Eren (prod. Jakub Galiński)</div>
        <div class="box">🔊 SeReK - Zjadam zęby (prod. Jeleń)</div>
        <div class="box">🔊 KW4RC - Fraktal</div>
        <div class="box">🔊 SeReK - Droga feat. Blackpope, Eren, Ten Esten (prod. Starbeats)</div>
        <div class="box">🔊 SeReK - Dziki Zachód</div>
        <div class="box">🔊 EMDO ft. SeReK, ECHO.REC - IKAR  Prod. EMDO  Cuty. Dj Yamakashi ( AUDIO )</div>
        <div class="box">🔊 Eren - Kolejny rok feat. SeReK, MIHU, Majer</div>
    </div>
    -->

    <div class="container">
        <div class="song-list">

            <a class="song"
            onclick="playSong('audio/Jaker - Oppenheimer feat. SeReK, Eren (cuty. SeReK).wav')">
            ▶ Jaker - Oppenheimer feat. SeReK, Eren (cuty. SeReK)
            </a>

            <a class="song"
            onclick="playSong('audio/SeReK & Eren - Dobranocka feat. Mart.wav')">
            ▶ SeReK & Eren - Dobranocka feat. Mart
            </a>

            <a class="song"
            onclick="playSong('audio/Blackpope Bman - Underdogs (feat. Kluzio & Gieha).wav')">
            ▶ Blackpope Bman - Underdogs (feat. Kluzio & Gieha)
            </a>

        </div>

        <!-- Pasek odtwarzacza -->
        <div class="player-bar">

            <audio id="audioPlayer" controls>
                <source src="" type="audio/mpeg">
                Twoja przeglądarka nie obsługuje audio.
            </audio>

        </div>

        <script>
            const player = document.getElementById("audioPlayer");

            function playSong(songPath) {

                player.src = songPath;

                player.play();
            }
        </script>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Mix/Mastering by Slant Records</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-image: url(tlo.jpg);
                        /* Brak powtarzania obrazka */
            background-repeat: no-repeat;

            /* Wyśrodkowanie obrazka */
            background-position: center center;

            /* Dopasowanie do całego ekranu */
            background-size: cover;

            /* Tło zostaje nieruchome przy scrollowaniu */
            background-attachment: fixed;

            /* Wysokość całego okna */
            height: auto;

        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 1.0;

            display: flex;
            flex-direction: column;
            gap: 20px;

            align-items: flex-start;
        }

        .box {
            display: inline-block; /* automatyczna długość box'a */
            background: rgba(0, 0, 0, 0.4);
            color: white;
            padding: 5px;
            border-radius: 10px;
            text-align: left;
            
        }

        /* Styl dla telefonów */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .box {
                font-size: 18px;
            }
        }

        /* Styl dla komputerów */
        @media (min-width: 769px) {
            .box {
                font-size: 20px;
            }
        }
    </style>

</head>
<body>
    
    <div class="container">
        <div class="box">Strona poprawnie działa na telefonie i komputerze</div>
        <div class="box">At o jest znacznie dłuższa wersja box'a, która wykracza poza standardowy rozmiar</div>
    </div>
    
    

</body>
</html>

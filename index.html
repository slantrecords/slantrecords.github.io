<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Mix/Mastering by Slant Records</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

    body {
        font-family: Arial, sans-serif;
        padding: 20px;

        /* układ strony */
        margin: 0;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;

        /* fallback (desktop) */
        background-image: url("tlo.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;

        /* usuwamy problematyczne fixed */
        background-attachment: scroll;
    }

    /* FIX: prawdziwe "fixed background" */
    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        background-image: url("tlo.jpg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;

        z-index: -1;
    }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 1.0;

            display: flex;
            justify-content: center;
            flex-direction: column;
            gap: 20px;

            align-items: flex-start;

        }

        .box {
            display: inline-block; /* automatyczna długość box'a */
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px;
            border-radius: 10px;
            text-align: left;
            
        }

        /* Styl dla telefonów */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                background-attachment: fixed;
            }

            .box {
                font-size: 18px;
            }
        }

        /* Styl dla komputerów */
        @media (min-width: 769px) {
            .box {
                font-size: 20px;
            }
        }

        /* Lista utworów */
        .song-list {
        padding: 20px;
        }

        .song {
        display: block;
        margin-bottom: 10px;
        padding: 10px;
        background: rgba(0,0,0,0.6);
        color: white;
        border-radius: 10px;
        text-decoration: none;
        width: fit-content;
        cursor: pointer;
        }

        /* Pasek audio na dole */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;

            background: rgba(0,0,0,0.15);

            padding: 10px;

            box-sizing: border-box;

            backdrop-filter: blur(10px);

            z-index: 999;
        }

        /* Audio */
        audio {
            width: 100%;
            filter: invert(1) sepia(1) saturate(5) hue-rotate(200deg);
        }


    </style>

</head>
<body>

    <div class="container">

        <div class="song-list">

            <a class="song"
               href="https://soundcloud.com/forss/flickermood"
               onclick="event.preventDefault(); playSC(this.href);">

               🔊 Forss - Flickermood

            </a>

            <a class="song"
               href="https://soundcloud.com/miami-nights-1984/accelerated"
               onclick="event.preventDefault(); playSC(this.href);">

               🔊 Miami Nights 1984 - Accelerated

            </a>

        </div>

    </div>

    <!-- Pasek odtwarzacza -->
    <div class="player-bar">

        <iframe
            id="sc-player"
            width="100%"
            height="120"
            allow="autoplay"
            frameborder="0">
        </iframe>

    </div>

    <!-- JavaScript -->
    <script>

    function playSC(trackUrl) {

        const player = document.getElementById("sc-player");

        player.src =
            "https://w.soundcloud.com/player/?url=" +
            encodeURIComponent(trackUrl) +
            "&auto_play=true";
    }

    </script>

</body>
</html>
